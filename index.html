<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home - Kumpulan Puisi</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cormorant Garamond', 'Georgia', serif;
      background: #0a0a0a;
      min-height: 100vh;
      color: #e8e8e8;
      overflow-x: hidden;
    }

    /* BACKGROUND */
    .bg-gradient {
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0a 50%);
      animation: rotateGradient 20s linear infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes rotateGradient {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .noise {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.03;
      z-index: 1;
      pointer-events: none;
    }

    /* FIX PALING PENTING: container PALING ATAS */
    .container {
      position: relative;
      z-index: 10000;
      max-width: 900px;
      margin: 0 auto;
      padding: 80px 40px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* Header */
    .header {
      margin-bottom: 80px;
      opacity: 0;
      animation: fadeInUp 1.2s ease-out 0.3s forwards;
    }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
      from { opacity: 0; transform: translateY(30px); }
    }

    h1 {
      font-size: 5em;
      font-weight: 300;
      letter-spacing: -2px;
      color: #fff;
      margin-bottom: 20px;
      text-shadow: 0 0 40px rgba(255,255,255,0.1);
    }

    .header-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, #c9a561 0%, transparent 100%);
      margin: 30px 0;
      animation: expandLine 1.3s ease-out forwards;
      transform-origin: left;
      transform: scaleX(0);
    }

    @keyframes expandLine { to { transform: scaleX(1); } }

    .subtitle {
      font-size: 1.2em;
      color: #aaa;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-family: Arial;
    }

    /* GRID */
    .poem-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 2px;
      background: rgba(201,165,97,0.1);
      padding: 2px;
      margin-bottom: 60px;
    }

    .poem-item {
      background: #0a0a0a;
      aspect-ratio: 16/9;
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
      animation: fadeIn 0.8s ease-out forwards;
      position: relative;
    }

    .poem-item:nth-child(1) { animation-delay: .5s; }
    .poem-item:nth-child(2) { animation-delay: .7s; }

    @keyframes fadeIn { to { opacity: 1; } }

    .poem-link {
      display: block;
      width: 100%;
      height: 100%;
      padding: 50px;
      color: inherit;
      text-decoration: none;
      position: relative;
      transition: .6s;
    }

    .poem-number { font-size:.85em; color:#666; opacity:0; transition:.4s }
    .poem-item:hover .poem-number { opacity:1; }

    .poem-title {
      font-size: 2.5em;
      color: #fff;
      margin-bottom: 15px;
      transition: .4s;
    }
    .poem-item:hover .poem-title { transform: translateX(10px); color:#c9a561; }

    .poem-excerpt {
      font-size: .95em;
      color: #777;
      font-style: italic;
      opacity: 0;
      transform: translateY(10px);
      transition: .4s;
    }
    .poem-item:hover .poem-excerpt { opacity:1; transform:translateY(0); }

    .arrow {
      position: absolute;
      bottom: 50px;
      right: 50px;
      width: 40px;
      height: 40px;
      opacity: 0;
      transition: .4s;
    }
    .poem-item:hover .arrow { opacity:1; transform:translateX(5px); }

    /* CURSOR FIX */
    .cursor-dot {
      width: 8px; height: 8px;
      background: #c9a561;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 5000;     /* DI BAWAH CONTAINER */
      transition: .15s;
      opacity: 0;
    }

    .cursor-outline {
      width: 40px; height: 40px;
      border: 1px solid rgba(201,165,97,0.5);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 5001;     /* DI BAWAH CONTAINER */
      transition: .2s;
      opacity: 0;
    }

  </style>
</head>

<body>

  <div class="bg-gradient"></div>
  <div class="noise"></div>
  <div class="cursor-dot"></div>
  <div class="cursor-outline"></div>

  <div class="container">

    <header class="header">
      <h1>Puisi</h1>
      <div class="header-line"></div>
      <p class="subtitle">Koleksi Karya</p>
    </header>

    <div class="poem-grid">

      <div class="poem-item">
        <a href="sinyal.html" class="poem-link">
          <div class="poem-number">01</div>
          <h2 class="poem-title">Sinyal</h2>
          <p class="poem-excerpt">Dalam keheningan malam, sinyal terputus mencari jalan pulang</p>
          <div class="arrow"></div>
        </a>
      </div>

      <div class="poem-item">
        <a href="pelukan.html" class="poem-link">
          <div class="poem-number">02</div>
          <h2 class="poem-title">Pelukan</h2>
          <p class="poem-excerpt">Kehangatan yang tersimpan dalam pelukan tanpa kata</p>
          <div class="arrow"></div>
        </a>
      </div>

    </div>

    <footer class="footer">
      <p>— Koleksi 2024 —</p>
    </footer>

  </div>

  <script>
    const cursorDot = document.querySelector('.cursor-dot');
    const cursorOutline = document.querySelector('.cursor-outline');

    let mouseX=0, mouseY=0, outlineX=0, outlineY=0;

    document.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;

      cursorDot.style.left = mouseX + "px";
      cursorDot.style.top = mouseY + "px";

      cursorDot.style.opacity = "1";
      cursorOutline.style.opacity = "1";
    });

    function animateOutline() {
      outlineX += (mouseX - outlineX) * 0.15;
      outlineY += (mouseY - outlineY) * 0.15;

      cursorOutline.style.left = outlineX + "px";
      cursorOutline.style.top = outlineY + "px";

      requestAnimationFrame(animateOutline);
    }
    animateOutline();
  </script>

</body>
</html>
