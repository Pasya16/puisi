<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home - Kumpulan Puisi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cormorant Garamond', 'Georgia', serif;
      background: #0a0a0a;
      min-height: 100vh;
      color: #e8e8e8;
      position: relative;
      overflow-x: hidden;
    }
    .container {
  position: relative;
  z-index: 999; /* TARO DI ATAS SEMUA BACKGROUND */
}


    /* Subtle animated gradient background */
    .bg-gradient {
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0a 50%);
      animation: rotateGradient 20s linear infinite;
      z-index: 0;
    }

    @keyframes rotateGradient {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Noise texture overlay */
    .noise {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 900px;
      margin: 0 auto;
      padding: 80px 40px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .header {
      margin-bottom: 80px;
      opacity: 0;
      animation: fadeInUp 1.2s ease-out 0.3s forwards;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
      from {
        opacity: 0;
        transform: translateY(30px);
      }
    }

    h1 {
      font-size: 5em;
      font-weight: 300;
      letter-spacing: -2px;
      margin-bottom: 20px;
      line-height: 1;
      color: #ffffff;
      text-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
    }

    .header-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, #c9a561 0%, transparent 100%);
      margin: 30px 0;
      animation: expandLine 1.5s ease-out 0.8s forwards;
      transform-origin: left;
      transform: scaleX(0);
    }

    @keyframes expandLine {
      to { transform: scaleX(1); }
    }

    .subtitle {
      font-size: 1.2em;
      color: #999;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-family: 'Arial', sans-serif;
    }

    .poem-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 2px;
      background: rgba(201, 165, 97, 0.1);
      padding: 2px;
      margin-bottom: 60px;
    }

    .poem-item {
      position: relative;
      background: #0a0a0a;
      aspect-ratio: 16/9;
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
      animation: fadeIn 0.8s ease-out forwards;
    }

    .poem-item:nth-child(1) { animation-delay: 0.5s; }
    .poem-item:nth-child(2) { animation-delay: 0.7s; }
    .poem-item:nth-child(3) { animation-delay: 0.9s; }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .poem-link {
      display: block;
      width: 100%;
      height: 100%;
      padding: 50px;
      text-decoration: none;
      color: inherit;
      position: relative;
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .poem-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(201, 165, 97, 0.1), transparent);
      transition: left 1s ease;
    }

    .poem-item:hover::before {
      left: 100%;
    }

    .poem-item::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px solid transparent;
      transition: border-color 0.4s ease;
    }

    .poem-item:hover::after {
      border-color: rgba(201, 165, 97, 0.3);
    }

    .poem-number {
      font-size: 0.85em;
      color: #666;
      letter-spacing: 2px;
      margin-bottom: 20px;
      font-family: 'Arial', sans-serif;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .poem-item:hover .poem-number {
      opacity: 1;
    }

    .poem-title {
      font-size: 2.5em;
      font-weight: 300;
      letter-spacing: -1px;
      color: #ffffff;
      margin-bottom: 15px;
      transition: transform 0.4s ease, color 0.4s ease;
    }

    .poem-item:hover .poem-title {
      transform: translateX(10px);
      color: #c9a561;
    }

    .poem-excerpt {
      font-size: 0.95em;
      color: #777;
      line-height: 1.8;
      font-style: italic;
      max-width: 300px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.4s ease 0.1s;
    }

    .poem-item:hover .poem-excerpt {
      opacity: 1;
      transform: translateY(0);
    }

    .arrow {
      position: absolute;
      bottom: 50px;
      right: 50px;
      width: 40px;
      height: 40px;
      opacity: 0;
      transition: all 0.4s ease 0.2s;
    }

    .poem-item:hover .arrow {
      opacity: 1;
      transform: translateX(5px);
    }

    .arrow::before,
    .arrow::after {
      content: '';
      position: absolute;
      background: #c9a561;
      transition: all 0.3s ease;
    }

    .arrow::before {
      width: 30px;
      height: 1px;
      top: 50%;
      left: 0;
    }

    .arrow::after {
      width: 10px;
      height: 10px;
      border-right: 1px solid #c9a561;
      border-top: 1px solid #c9a561;
      transform: rotate(45deg);
      right: 0;
      top: calc(50% - 5px);
    }

    .footer {
      text-align: center;
      padding: 40px 0;
      color: #555;
      font-size: 0.9em;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Arial', sans-serif;
      opacity: 0;
      animation: fadeIn 1s ease-out 1.5s forwards;
    }

    @media (max-width: 768px) {
      .container {
        padding: 60px 25px;
      }

      h1 {
        font-size: 3em;
      }

      .poem-grid {
        grid-template-columns: 1fr;
        gap: 1px;
      }

      .poem-link {
        padding: 35px;
      }

      .poem-title {
        font-size: 2em;
      }
    }

    /* Cursor effect */
    .cursor-dot {
      width: 8px;
      height: 8px;
      background: #c9a561;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.15s ease, opacity 0.15s ease;
      opacity: 0;
      mix-blend-mode: difference;
    }

    .cursor-outline {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(201, 165, 97, 0.5);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.2s ease;
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="noise"></div>
  <div class="cursor-dot"></div>
  <div class="cursor-outline"></div>

  <div class="container">
    <header class="header">
      <h1>Puisi</h1>
      <div class="header-line"></div>
      <p class="subtitle">Koleksi Karya</p>
    </header>

    <div class="poem-grid">
      <div class="poem-item">
        <a href="sinyal.html" class="poem-link">
          <div class="poem-number">01</div>
          <h2 class="poem-title">Sinyal</h2>
          <p class="poem-excerpt">Dalam keheningan malam, sinyal terputus mencari jalan pulang</p>
          <div class="arrow"></div>
        </a>
      </div>

      <div class="poem-item">
        <a href="pelukan.html" class="poem-link">
          <div class="poem-number">02</div>
          <h2 class="poem-title">Pelukan</h2>
          <p class="poem-excerpt">Kehangatan yang tersimpan dalam pelukan tanpa kata</p>
          <div class="arrow"></div>
        </a>
      </div>

      <!-- Tambah puisi lainnya di bawah ini -->
    </div>

    <footer class="footer">
      <p>— Koleksi 2024 —</p>
    </footer>
  </div>

  <script>
    // Custom cursor
    const cursorDot = document.querySelector('.cursor-dot');
    const cursorOutline = document.querySelector('.cursor-outline');

    let mouseX = 0, mouseY = 0;
    let outlineX = 0, outlineY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      
      cursorDot.style.left = mouseX + 'px';
      cursorDot.style.top = mouseY + 'px';
      cursorDot.style.opacity = '1';
      cursorOutline.style.opacity = '1';
    });

    function animateOutline() {
      outlineX += (mouseX - outlineX) * 0.15;
      outlineY += (mouseY - outlineY) * 0.15;
      
      cursorOutline.style.left = outlineX + 'px';
      cursorOutline.style.top = outlineY + 'px';
      
      requestAnimationFrame(animateOutline);
    }
    animateOutline();

    // Hover effect for poems
    const poemItems = document.querySelectorAll('.poem-item');
    poemItems.forEach(item => {
      item.addEventListener('mouseenter', () => {
        cursorDot.style.transform = 'scale(1.5)';
        cursorOutline.style.transform = 'scale(1.5)';
      });
      
      item.addEventListener('mouseleave', () => {
        cursorDot.style.transform = 'scale(1)';
        cursorOutline.style.transform = 'scale(1)';
      });
    });

    // Hide cursor when leaving window
    document.addEventListener('mouseleave', () => {
      cursorDot.style.opacity = '0';
      cursorOutline.style.opacity = '0';
    });
  </script>
</body>
</html>
