<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Curcol — Puisyaa</title>
  <link rel="icon" type="image/png" href="picture/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --ink:   #2a3347;
      --cream: #f0f4fa;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans:  'Jost', system-ui, sans-serif;
    }

    html, body { background: var(--cream); }

    body {
      font-family: var(--sans);
      color: var(--ink);
      overflow-x: hidden;
      cursor: none;
      min-height: 100vh;
    }

    body::after {
      content:''; position:fixed; inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:160px 160px; opacity:.025;
      pointer-events:none; z-index:9000;
    }

    #cur {
      position:fixed; width:6px; height:6px;
      background:var(--ink); border-radius:50%;
      pointer-events:none; z-index:8000;
      transform:translate(-50%,-50%);
      transition:width .2s, height .2s, background .3s;
    }
    #cur-r {
      position:fixed; width:28px; height:28px;
      border:1px solid rgba(42,51,71,.25); border-radius:50%;
      pointer-events:none; z-index:7999;
      transform:translate(-50%,-50%);
      transition:all .4s cubic-bezier(.22,1,.36,1);
    }
    body.hov #cur { width:10px; height:10px; }
    body.hov #cur-r { width:52px; height:52px; border-color:rgba(42,51,71,.15); }

    nav {
      position:fixed; top:0; left:0; right:0; z-index:500;
      padding:20px 56px;
      display:flex; justify-content:space-between; align-items:center;
      background:rgba(240,244,250,.92); backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(42,51,71,.08);
    }

    .logo {
      font-family:var(--serif); font-size:1.25em;
      font-style:italic; font-weight:300;
      color:var(--ink); text-decoration:none; letter-spacing:2px;
    }

    .nav-links { display:flex; gap:40px; list-style:none; align-items:center; }

    .nav-links a {
      font-size:.68em; letter-spacing:3px; text-transform:uppercase;
      color:rgba(42,51,71,.4); text-decoration:none;
      transition:color .3s; position:relative;
    }

    .nav-links a::after {
      content:''; position:absolute; bottom:-4px; left:0;
      width:0; height:1px; background:var(--ink);
      transition:width .35s ease;
    }

    .nav-links a:hover { color:var(--ink); }
    .nav-links a:hover::after, .nav-links a.active::after { width:100%; }
    .nav-links a.active { color:var(--ink); }

    .write-link {
      background:var(--ink); color:var(--cream) !important;
      padding:9px 18px; border-radius:20px;
    }
    .write-link::after { display:none; }
    .write-link:hover { opacity:.85; color:var(--cream) !important; }

    .menu-btn {
      display:none; background:none;
      border:1px solid rgba(42,51,71,.15);
      color:var(--ink); padding:6px 14px;
      font-size:.68em; letter-spacing:2px; text-transform:uppercase; cursor:none;
    }

    .page-header {
      padding:120px 56px 56px;
      border-bottom:1px solid rgba(42,51,71,.08);
      position:relative; overflow:hidden;
    }

    .page-header::before {
      content:''; position:absolute; inset:0;
      background:
        radial-gradient(ellipse 50% 80% at 90% 50%, rgba(245,221,184,.3) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 5% 80%, rgba(213,197,240,.2) 0%, transparent 60%);
      pointer-events:none;
    }

    .header-eyebrow {
      font-size:.62em; letter-spacing:5px; text-transform:uppercase;
      color:rgba(42,51,71,.4); margin-bottom:16px;
      opacity:0; transform:translateY(10px);
      animation:up .6s ease .1s forwards;
    }

    .header-title {
      font-family:var(--serif);
      font-size:clamp(3.5em,8vw,6.5em);
      font-weight:300; font-style:italic;
      line-height:.95; color:var(--ink);
      opacity:0; transform:translateY(20px);
      animation:up .9s cubic-bezier(.22,1,.36,1) .2s forwards;
    }

    .header-sub {
      font-size:.82em; font-weight:300;
      color:rgba(42,51,71,.42); margin-top:20px;
      max-width:400px; line-height:1.8;
      opacity:0; transform:translateY(10px);
      animation:up .7s ease .4s forwards;
    }

    .blob-row {
      position:absolute; top:40px; right:56px;
      display:flex; gap:8px; align-items:center;
      opacity:0; animation:up .5s ease .6s forwards;
    }

    .blob { width:12px; height:12px; border-radius:50%; }

    @keyframes up { to { opacity:1; transform:translateY(0); } }

    .notes-area {
      padding:56px 56px 100px;
      max-width:1200px; margin:0 auto;
    }

    .notes-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
      gap:20px;
    }

    .note-card {
      position:relative;
      background:#fff;
      border-radius:2px;
      overflow:hidden;
      opacity:0; transform:translateY(16px);
      transition:transform .4s cubic-bezier(.22,1,.36,1),
                 box-shadow .4s ease;
      box-shadow:0 2px 12px rgba(42,51,71,.05);
    }

    .note-card.on { animation:cardUp .6s ease forwards; }

    @keyframes cardUp { to { opacity:1; transform:translateY(0); } }

    .note-card:hover {
      transform:translateY(-4px) rotate(0.3deg);
      box-shadow:0 12px 40px rgba(42,51,71,.1);
    }

    .note-bar {
      position:absolute; left:0; top:0; bottom:0;
      width:4px;
    }

    .note-inner { padding:28px 24px 24px 32px; }

    .note-date {
      display:inline-flex; align-items:center; gap:7px;
      font-size:.6em; letter-spacing:2px; text-transform:uppercase;
      color:rgba(42,51,71,.35); margin-bottom:14px;
    }

    .note-date-dot { width:5px; height:5px; border-radius:50%; opacity:.6; }

    .note-title {
      font-family:var(--serif);
      font-size:1.65em; font-weight:400; line-height:1.2;
      color:var(--ink); margin-bottom:12px;
      display:-webkit-box; -webkit-line-clamp:2;
      -webkit-box-orient:vertical; overflow:hidden;
    }

    .note-excerpt {
      font-size:.82em; font-weight:300;
      color:rgba(42,51,71,.5); line-height:1.8;
      display:-webkit-box; -webkit-line-clamp:3;
      -webkit-box-orient:vertical; overflow:hidden;
      white-space:pre-line;
    }

    .note-foot {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 24px 20px 32px;
      border-top:1px solid rgba(42,51,71,.05);
      margin-top:16px;
    }

    .note-time { font-size:.62em; letter-spacing:2px; color:rgba(42,51,71,.28); }

    .note-tag {
      font-size:.58em; letter-spacing:2px; text-transform:uppercase;
      padding:4px 10px; border-radius:20px; color:rgba(42,51,71,.5);
    }

    .empty-state, .loading-state, .error-state {
      grid-column:1/-1;
      text-align:center; padding:80px 20px;
      color:rgba(42,51,71,.3);
    }

    .empty-state p, .loading-state p, .error-state p {
      font-family:var(--serif); font-style:italic;
      font-size:1.4em; font-weight:300;
    }

    .error-state a { color:#7b8fd4; font-style:normal; font-size:.6em; letter-spacing:1px; }

    footer {
      padding:32px 56px;
      border-top:1px solid rgba(42,51,71,.08);
      display:flex; justify-content:space-between; align-items:center;
    }

    .footer-logo {
      font-family:var(--serif); font-style:italic; font-size:1.1em;
      color:rgba(42,51,71,.28); text-decoration:none; transition:color .3s;
    }
    .footer-logo:hover { color:var(--ink); }
    .footer-copy { font-size:.62em; letter-spacing:2px; color:rgba(42,51,71,.2); }

    @media (max-width:768px) {
      #cur, #cur-r { display:none; }
      body { cursor:auto; }
      nav { padding:16px 24px; }
      .nav-links {
        position:fixed; inset:0;
        background:rgba(240,244,250,.97);
        flex-direction:column; justify-content:center; align-items:center; gap:36px;
        transform:translateX(100%);
        transition:transform .5s cubic-bezier(.76,0,.24,1); z-index:490;
      }
      .nav-links.open { transform:translateX(0); }
      .nav-links a { font-size:.9em; letter-spacing:4px; }
      .menu-btn { display:block; cursor:pointer; }
      .page-header { padding:100px 24px 44px; }
      .blob-row { right:24px; }
      .notes-area { padding:44px 24px 80px; }
      .notes-grid { grid-template-columns:1fr; gap:16px; }
      footer { padding:28px 24px; flex-direction:column; gap:10px; text-align:center; }
    }
  </style>
</head>
<body>

<div id="cur"></div>
<div id="cur-r"></div>

<!-- NAV -->
<nav>
  <a href="index.html" class="logo">Puisyaa</a>
  <button class="menu-btn" id="menuBtn">Menu</button>
  <ul class="nav-links" id="navLinks">
    <li><a href="newjeans.html">NewJeans</a></li>
    <li><a href="index.html">Beranda</a></li>
    <li><a href="index.html#koleksi">Koleksi</a></li>
    <li><a href="tentang.html">Tentang</a></li>
    <li><a href="curcol.html" class="active">Curcol</a></li>
    <li><a href="pokemon.html">Pokédex</a></li>
    <li><a href="tulis.html" class="write-link">+ Tulis</a></li>
  </ul>
</nav>

<!-- HEADER -->
<div class="page-header">
  <div class="blob-row" id="blobRow"></div>
  <div class="header-eyebrow">Catatan Harian</div>
  <h1 class="header-title">Curcol</h1>
  <p class="header-sub">Hal-hal kecil yang terlalu receh untuk jadi puisi, tapi terlalu berat untuk disimpan sendiri.</p>
</div>

<!-- NOTES -->
<div class="notes-area">
  <div class="notes-grid" id="notesGrid">
    <div class="loading-state"><p>memuat catatan...</p></div>
  </div>
</div>

<footer>
  <a href="index.html" class="footer-logo">Puisyaa</a>
  <span class="footer-copy">© 2025 — Semua rasa tersimpan di sini</span>
</footer>

<script>
  const REPO_OWNER = 'Pasya16';
  const REPO_NAME  = 'puisi';

  // ── WARNA PASTEL ─────────────────────────────────────────────────────────
  const palette = [
    { bar:'#f4a7b9', chip:'rgba(244,167,185,.18)', dot:'#f4a7b9' },  // rose
    { bar:'#89bfe8', chip:'rgba(137,191,232,.18)', dot:'#89bfe8' },  // blue
    { bar:'#92d4a0', chip:'rgba(146,212,160,.18)', dot:'#92d4a0' },  // sage
    { bar:'#f0c27a', chip:'rgba(240,194,122,.18)', dot:'#f0c27a' },  // peach
    { bar:'#b8a4e0', chip:'rgba(184,164,224,.18)', dot:'#b8a4e0' },  // lavender
    { bar:'#7dd4cc', chip:'rgba(125,212,204,.18)', dot:'#7dd4cc' },  // mint
  ];

  const blobRow = document.getElementById('blobRow');
  palette.forEach(p => {
    const b = document.createElement('div');
    b.className = 'blob';
    b.style.background = p.bar;
    blobRow.appendChild(b);
  });

  const grid = document.getElementById('notesGrid');

  function formatDate(iso) {
    const d = new Date(iso);
    const bulan = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
    return `${d.getDate()} ${bulan[d.getMonth()]} ${d.getFullYear()}`;
  }
  function formatTime(iso) {
    const d = new Date(iso);
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function renderNotes(issues) {
    if (!issues.length) {
      grid.innerHTML = `<div class="empty-state"><p>belum ada curhatan tersimpan di sini.</p></div>`;
      return;
    }

    grid.innerHTML = '';
    issues.forEach((issue, i) => {
      const c = palette[i % palette.length];
      const tag = (issue.labels && issue.labels[0]) ? (issue.labels[0].name || issue.labels[0]) : 'catatan';
      const text = (issue.body || '').trim();

      const card = document.createElement('div');
      card.className = 'note-card';
      card.style.animationDelay = (i * 0.07) + 's';
      card.innerHTML = `
        <div class="note-bar" style="background:${c.bar}"></div>
        <div class="note-inner">
          <div class="note-date">
            <span class="note-date-dot" style="background:${c.dot}"></span>
            ${formatDate(issue.created_at)}
          </div>
          <div class="note-title"></div>
          <div class="note-excerpt"></div>
        </div>
        <div class="note-foot">
          <span class="note-time">${formatTime(issue.created_at)}</span>
          <span class="note-tag" style="background:${c.chip}"></span>
        </div>
      `;
      // set text content safely to avoid HTML injection from issue content
      card.querySelector('.note-title').textContent = issue.title;
      card.querySelector('.note-excerpt').textContent = text;
      card.querySelector('.note-tag').textContent = tag;

      grid.appendChild(card);
    });

    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (!e.isIntersecting) return;
        e.target.classList.add('on');
        io.unobserve(e.target);
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.note-card').forEach(el => io.observe(el));
  }

  async function loadNotes() {
    try {
      const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?state=open&per_page=100`, {
        headers: { 'Accept': 'application/vnd.github+json' }
      });
      if (!res.ok) throw new Error('status ' + res.status);
      const data = await res.json();
      // filter out pull requests (issues API also returns PRs)
      const issues = data.filter(i => !i.pull_request);
      renderNotes(issues);
    } catch (err) {
      grid.innerHTML = `
        <div class="error-state">
          <p>gagal memuat catatan.</p>
          <a href="javascript:location.reload()">coba lagi</a>
        </div>`;
    }
  }

  loadNotes();

  // ── CURSOR ───────────────────────────────────────────────────────────────
  const cur = document.getElementById('cur'), curR = document.getElementById('cur-r');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove', e => {
    mx=e.clientX; my=e.clientY;
    cur.style.left=mx+'px'; cur.style.top=my+'px';
  });
  (function loop(){ rx+=(mx-rx)*.1; ry+=(my-ry)*.1;
    curR.style.left=rx+'px'; curR.style.top=ry+'px';
    requestAnimationFrame(loop); })();
  document.body.addEventListener('mouseover', e => {
    if (e.target.closest('a, .note-card')) document.body.classList.add('hov');
  });
  document.body.addEventListener('mouseout', e => {
    if (e.target.closest('a, .note-card')) document.body.classList.remove('hov');
  });

  // ── NAV ──────────────────────────────────────────────────────────────────
  document.getElementById('menuBtn').addEventListener('click', () =>
    document.getElementById('navLinks').classList.toggle('open'));
  document.querySelectorAll('.nav-links a').forEach(a =>
    a.addEventListener('click', () => document.getElementById('navLinks').classList.remove('open')));
</script>
</body>
</html>
